<svg xmlns="http://www.w3.org/2000/svg" viewBox="60 -50 280 230" width="280" height="230">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- TV Screen Shape -->
  <rect x="100" y="20" width="200" height="140" rx="15" fill="url(#grad1)" filter="url(#glow)"/>
  
  <!-- Screen Inner -->
  <rect x="110" y="30" width="180" height="120" rx="8" fill="#0f0f23"/>
  
  <!-- Play Button Triangle -->
  <polygon points="170,65 220,90 170,115" fill="url(#grad2)" filter="url(#glow)"/>
  
  <!-- TV Stand -->
  <rect x="160" y="160" width="80" height="12" rx="3" fill="url(#grad1)"/>
  <rect x="140" y="169" width="120" height="10" rx="5" fill="url(#grad2)"/>
  
  <!-- Antenna Left -->
  <line x1="140" y1="20" x2="110" y2="-10" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="110" cy="-10" r="6" fill="url(#grad2)"/>
  
  <!-- Antenna Right -->
  <line x1="260" y1="20" x2="290" y2="-10" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="290" cy="-10" r="6" fill="url(#grad2)"/>
  
  <!-- Signal Waves -->
  <path d="M 180 -15 Q 200 -30 220 -15" stroke="#818cf8" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 170 -25 Q 200 -45 230 -25" stroke="#c084fc" stroke-width="3" fill="none" opacity="0.4"/>
</svg>