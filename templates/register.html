<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — EnigmaTV</title>
    <link rel="icon" type="image/svg+xml" href="/static/enigma/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/enigma/auth.css">
</head>
<body>
    <div class="auth-bg">
        <div class="auth-orb auth-orb-1"></div>
        <div class="auth-orb auth-orb-2"></div>
    </div>

    <div class="auth-container">
        <a href="/" class="auth-brand">
            <img src="/static/enigma/logo.svg" alt="EnigmaTV" class="auth-logo">
            <span class="auth-brand-text">Enigma<span class="tv">TV</span></span>
        </a>

        <div class="auth-card">
            <h1 class="auth-title">Crear tu cuenta</h1>
            <p class="auth-subtitle">Únete a EnigmaTV y empieza a disfrutar</p>

            {% if error %}
            <div class="auth-alert auth-alert-error">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                {{ error }}
            </div>
            {% endif %}

            <form action="/api/auth/register" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="name">Nombre completo</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="name" name="name" placeholder="Tu nombre" required autocomplete="name">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" name="password" placeholder="Mínimo 4 caracteres" required minlength="4" autocomplete="new-password">
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm">Confirmar contraseña</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="confirm" name="confirm" placeholder="Repite tu contraseña" required minlength="4" autocomplete="new-password">
                    </div>
                </div>

                <div class="form-group">
                    <label>Plan</label>
                    <div class="plan-selector">
                        <label class="plan-option">
                            <input type="radio" name="plan" value="free" checked>
                            <div class="plan-option-card">
                                <span class="plan-option-name">Free</span>
                                <span class="plan-option-price">$0</span>
                            </div>
                        </label>
                        <label class="plan-option">
                            <input type="radio" name="plan" value="inicio">
                            <div class="plan-option-card plan-option-inicio">
                                <span class="plan-option-name">Inicio</span>
                                <span class="plan-option-price">$990</span>
                            </div>
                        </label>
                        <label class="plan-option">
                            <input type="radio" name="plan" value="premium">
                            <div class="plan-option-card plan-option-premium">
                                <span class="plan-option-name">Premium</span>
                                <span class="plan-option-price">$4.990</span>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Crear cuenta</button>
            </form>

            <p class="auth-footer-text">
                ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
            </p>
        </div>

        <a href="/" class="auth-back">← Volver al inicio</a>
    </div>

    <script>
        // Pre-select plan from URL param
        const params = new URLSearchParams(window.location.search);
        const planParam = params.get('plan');
        if (planParam) {
            const radio = document.querySelector(`input[value="${planParam}"]`);
            if (radio) radio.checked = true;
        }
    </script>
</body>
</html>
